<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Capability Service</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1f1f1f;
      --border:    #2a2a2a;
      --text:      #e8e8e8;
      --muted:     #6b6b6b;
      --primary:   #7c5cfc;
      --primary-h: #6a4be0;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Sidebar ─────────────────────────── */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 18px 16px;
      gap: 18px;
      overflow-y: auto;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .logo-name { font-weight: 700; font-size: 15px; }
    .logo-sub  { font-size: 11px; color: var(--muted); }

    .divider { height: 1px; background: var(--border); }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    }

    .field-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .field-input:focus { border-color: var(--primary); }
    select.field-input { cursor: pointer; }
    textarea.field-input { resize: vertical; line-height: 1.5; }

    .key-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
      transition: background .2s;
    }
    .status-dot.ok { background: var(--green); }
    .status-dot.warn { background: var(--yellow); }

    .service-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--muted);
      white-space: pre-wrap;
    }
    .service-box.live { color: #4ade80; }
    .service-box.err  { color: var(--red); }

    /* ── Main ────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .tab {
      padding: 13px 18px;
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ── Chat panel ──────────────────────── */
    .chat-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .chat-info { font-size: 12px; color: var(--muted); }

    .btn-sm {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted);
    }
    .empty-icon { font-size: 44px; opacity: .4; }
    .empty-title { font-size: 16px; }
    .empty-sub   { font-size: 12px; opacity: .7; }

    .msg { display: flex; flex-direction: column; max-width: 72%; gap: 3px; }
    .msg.user      { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-role { font-size: 11px; color: var(--muted); }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user      .bubble { background: var(--primary); border-bottom-right-radius: 4px; }
    .msg.assistant .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-meta { font-size: 11px; color: var(--muted); }

    /* Typing indicator */
    .typing-bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity:.4; }
      30%          { transform: translateY(-5px); opacity:1; }
    }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px; font-family: inherit;
      resize: none; outline: none;
      min-height: 46px; max-height: 180px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--primary); }

    .btn-send {
      height: 46px; padding: 0 20px;
      background: var(--primary);
      border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s, opacity .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-send:hover   { background: var(--primary-h); }
    .btn-send:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Capability panel ────────────────── */
    .cap-scroll {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
      max-width: 820px; width: 100%; margin: 0 auto;
    }

    .cap-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .cap-title {
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
    }
    .badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 99px;
      background: rgba(124,92,252,.18);
      color: #a78bfa; font-weight: 500;
    }

    .result-area {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px; line-height: 1.7;
      min-height: 56px; color: var(--muted);
      white-space: pre-wrap; word-break: break-word;
    }
    .result-area.ok  { color: var(--text); }
    .result-area.err { color: var(--red); border-color: rgba(239,68,68,.3); }

    .btn-run {
      align-self: flex-start;
      padding: 9px 18px;
      background: var(--primary); border: none;
      border-radius: 8px; color: #fff;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      display: flex; align-items: center; gap: 7px;
    }
    .btn-run:hover    { background: var(--primary-h); }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    /* Spinner */
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; top: 18px; right: 18px;
      padding: 10px 16px; border-radius: 8px;
      font-size: 13px; z-index: 9999;
      animation: fadeIn .25s ease;
    }
    .toast.ok  { background: rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.3); color:#4ade80; }
    .toast.err { background: rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); color:#f87171; }
    @keyframes fadeIn {
      from { transform: translateX(60px); opacity:0; }
      to   { transform: translateX(0);    opacity:1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────── -->
<aside class="sidebar">
  <div class="logo-row">
    <div class="logo-icon">✦</div>
    <div>
      <div class="logo-name">AI Service</div>
      <div class="logo-sub">Capability Dashboard</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field-group">
    <div class="field-label">API Key</div>
    <input id="apiKey" type="password" class="field-input" placeholder="sk-ant-api03-…" />
    <div class="key-status">
      <div class="status-dot" id="keyDot"></div>
      <span id="keyText">未配置</span>
    </div>
  </div>

  <div class="field-group">
    <div class="field-label">模型</div>
    <select id="modelSel" class="field-input">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (推荐)</option>
      <option value="claude-opus-4-6">Claude Opus 4.6 (最强)</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (最快)</option>
    </select>
  </div>

  <div class="field-group">
    <div class="field-label">系统提示词</div>
    <textarea id="sysPrompt" class="field-input" rows="3">You are a helpful assistant.</textarea>
  </div>

  <div class="divider"></div>

  <div class="field-group">
    <div class="field-label">服务状态</div>
    <div class="service-box" id="svcBox">检查中…</div>
  </div>
</aside>

<!-- ── Main ──────────────────────────────── -->
<div class="main">
  <div class="tabs">
    <div class="tab active" data-panel="chat">💬 对话</div>
    <div class="tab" data-panel="cap">⚡ 能力测试</div>
  </div>

  <!-- Chat panel -->
  <div class="panel active" id="panel-chat">
    <div class="chat-toolbar">
      <div class="chat-info" id="msgCount">0 条消息</div>
      <button class="btn-sm" onclick="clearChat()">清空对话</button>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <div class="empty-title">开始对话</div>
        <div class="empty-sub">在左侧配置 API Key，选择模型后发送消息</div>
      </div>
    </div>

    <div class="input-row">
      <textarea id="chatInput" class="chat-input" rows="1"
        placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="sendBtn" class="btn-send" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- Capability panel -->
  <div class="panel" id="panel-cap">
    <div class="cap-scroll">

      <!-- Text Summary -->
      <div class="cap-card">
        <div class="cap-title">📝 文本摘要 <span class="badge">text_summary</span></div>

        <div class="field-group">
          <div class="field-label">原始文本</div>
          <textarea id="sumText" class="field-input" rows="4"
            placeholder="输入需要摘要的文本…">人工智能是指计算机系统执行通常需要人类智能才能完成的任务的能力，例如视觉感知、语音识别、决策制定和语言翻译。近年来，随着深度学习技术的突破，人工智能在医疗、金融、教育等多个领域取得了显著进展。大型语言模型的出现更是将自然语言处理推向了新的高度，使得机器能够理解和生成人类语言。</textarea>
        </div>

        <div class="field-group">
          <div class="field-label">最大字符数</div>
          <input id="sumLen" type="number" class="field-input" value="120" min="20" max="500" style="width:120px" />
        </div>

        <button id="sumBtn" class="btn-run" onclick="runSummary()">运行摘要</button>

        <div class="field-group">
          <div class="field-label">结果</div>
          <div class="result-area" id="sumResult">等待运行…</div>
        </div>
      </div>

      <!-- Sentiment Analysis -->
      <div class="cap-card">
        <div class="cap-title">😊 情感分析 <span class="badge">sentiment_analysis</span></div>

        <div class="field-group">
          <div class="field-label">分析文本</div>
          <textarea id="sentText" class="field-input" rows="3"
            placeholder="输入需要分析情感的文本…">这个产品真的太棒了！用了之后完全超出预期，强烈推荐给大家。</textarea>
        </div>

        <button id="sentBtn" class="btn-run" onclick="runSentiment()">分析情感</button>

        <div class="field-group">
          <div class="field-label">结果</div>
          <div class="result-area" id="sentResult">等待运行…</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── State ───────────────────────────────
let history = [];   // {role, content}[]
let busy     = false;

// ── Tabs ────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.panel).classList.add('active');
  });
});

// ── API key indicator ────────────────────
const apiKeyEl = document.getElementById('apiKey');
apiKeyEl.addEventListener('input', updateKeyStatus);

function updateKeyStatus() {
  const v = apiKeyEl.value.trim();
  const dot  = document.getElementById('keyDot');
  const text = document.getElementById('keyText');
  if (v.startsWith('sk-')) {
    dot.className = 'status-dot ok';
    text.textContent = '已配置';
  } else if (v.length > 0) {
    dot.className = 'status-dot warn';
    text.textContent = '格式可能有误';
  } else {
    dot.className = 'status-dot';
    text.textContent = '未配置（Mock 模式）';
  }
}

// ── Health check ─────────────────────────
async function checkHealth() {
  const box = document.getElementById('svcBox');
  try {
    const r = await fetch('/healthz');
    const d = await r.json();
    box.className = 'service-box live';
    box.textContent =
      `✓ 服务运行中\n模式: ${d.mode === 'live' ? 'LIVE' : 'MOCK'}\n能力: ${d.capabilities.join(', ')}`;
  } catch {
    box.className = 'service-box err';
    box.textContent = '✗ 无法连接服务';
  }
}
checkHealth();

// ── Chat helpers ─────────────────────────
const messagesEl  = document.getElementById('messages');
const chatInputEl = document.getElementById('chatInput');
const sendBtnEl   = document.getElementById('sendBtn');

chatInputEl.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 180) + 'px';
});
chatInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMsg(role, content, meta) {
  document.getElementById('emptyState')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `
    <div class="msg-role">${role === 'user' ? '你' : 'Assistant'}</div>
    <div class="bubble">${esc(content)}</div>
    ${meta ? `<div class="msg-meta">${meta}</div>` : ''}`;
  messagesEl.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping() {
  document.getElementById('emptyState')?.remove();
  const d = document.createElement('div');
  d.className = 'msg assistant'; d.id = 'typing';
  d.innerHTML = `
    <div class="msg-role">Assistant</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  messagesEl.appendChild(d);
  scrollBottom();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function updateCount() {
  document.getElementById('msgCount').textContent = `${history.length} 条消息`;
}

function clearChat() {
  history = [];
  messagesEl.innerHTML = `
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-title">开始对话</div>
      <div class="empty-sub">在左侧配置 API Key，选择模型后发送消息</div>
    </div>`;
  updateCount();
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Send message ─────────────────────────
async function sendMessage() {
  if (busy) return;
  const text = chatInputEl.value.trim();
  if (!text) return;

  busy = true;
  sendBtnEl.disabled = true;
  sendBtnEl.innerHTML = '<span class="spin"></span>';
  chatInputEl.value = '';
  chatInputEl.style.height = 'auto';

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  updateCount();
  showTyping();

  try {
    const res = await fetch('/v1/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key:  apiKeyEl.value.trim(),
        model:    document.getElementById('modelSel').value,
        system:   document.getElementById('sysPrompt').value.trim(),
        messages: history,
      }),
    });
    const data = await res.json();
    hideTyping();

    if (data.ok) {
      history.push({ role: 'assistant', content: data.message });
      const u = data.usage;
      const meta = u ? `${u.input_tokens} in / ${u.output_tokens} out tokens · ${data.model}` : null;
      addMsg('assistant', data.message, meta);
    } else {
      const errMsg = data.error || '未知错误';
      addMsg('assistant', `⚠ ${errMsg}`);
      toast(errMsg, 'err');
    }
  } catch (e) {
    hideTyping();
    addMsg('assistant', `⚠ 网络错误: ${e.message}`);
    toast('网络请求失败', 'err');
  }

  updateCount();
  busy = false;
  sendBtnEl.disabled = false;
  sendBtnEl.innerHTML = '发送';
}

// ── Capability: text_summary ─────────────
async function runSummary() {
  const text    = document.getElementById('sumText').value.trim();
  const maxLen  = parseInt(document.getElementById('sumLen').value) || 120;
  const resEl   = document.getElementById('sumResult');
  const btn     = document.getElementById('sumBtn');

  if (!text) { resEl.className='result-area err'; resEl.textContent='请输入文本'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 运行中';
  resEl.className = 'result-area';
  resEl.textContent = '运行中…';

  try {
    const res  = await fetch('/v1/capabilities/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ capability:'text_summary', input:{ text, max_length: maxLen } }),
    });
    const data = await res.json();
    if (data.ok) {
      resEl.className = 'result-area ok';
      resEl.textContent = `${data.data.result}\n\n⏱ 耗时 ${data.meta.elapsed_ms} ms`;
    } else {
      resEl.className = 'result-area err';
      resEl.textContent = `[${data.error.code}] ${data.error.message}`;
    }
  } catch (e) {
    resEl.className = 'result-area err';
    resEl.textContent = `网络错误: ${e.message}`;
  }

  btn.disabled = false;
  btn.innerHTML = '运行摘要';
}

// ── Capability: sentiment_analysis ───────
async function runSentiment() {
  const text  = document.getElementById('sentText').value.trim();
  const resEl = document.getElementById('sentResult');
  const btn   = document.getElementById('sentBtn');

  if (!text) { resEl.className='result-area err'; resEl.textContent='请输入文本'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 分析中';
  resEl.className = 'result-area';
  resEl.textContent = '分析中…';

  try {
    const res  = await fetch('/v1/capabilities/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ capability:'sentiment_analysis', input:{ text } }),
    });
    const data = await res.json();
    if (data.ok) {
      const r = data.data.result;
      const emoji = r.sentiment === 'positive' ? '😊' : r.sentiment === 'negative' ? '😞' : '😐';
      resEl.className = 'result-area ok';
      resEl.textContent =
        `${emoji} ${r.sentiment.toUpperCase()}  得分: ${(r.score*100).toFixed(1)}%\n\n${r.explanation}\n\n⏱ 耗时 ${data.meta.elapsed_ms} ms`;
    } else {
      resEl.className = 'result-area err';
      resEl.textContent = `[${data.error.code}] ${data.error.message}`;
    }
  } catch (e) {
    resEl.className = 'result-area err';
    resEl.textContent = `网络错误: ${e.message}`;
  }

  btn.disabled = false;
  btn.innerHTML = '分析情感';
}

updateKeyStatus();
</script>
</body>
</html>
